[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
testpaths = tests
markers =
    unit: Unit tests (no DB)
    integration: Integration tests (with DB)
    e2e: End-to-end tests (full API flows)
