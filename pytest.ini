[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directorio de tests
testpaths = tests

# Opciones por defecto
addopts =
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
    --nomigrations
    -ra

# Markers personalizados
markers =
    unit: Unit tests (rápidos, sin BD)
    integration: Integration tests (con BD real)
    feature: Feature tests (workflows de negocio)
    e2e: End-to-end tests (API completa)
    slow: Tests lentos

# Configuración de cobertura
addopts = --cov=src --cov-report=html --cov-report=term

# Ignorar warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
